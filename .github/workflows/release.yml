name: Build desktop releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -v

  build-windows:
    name: Build Windows app
    needs: test
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install -r requirements-build.txt

      - name: Build Windows executables
        run: |
          pyinstaller --onefile --windowed --name AcademicLiteratureSearch literature_search_gui.py
          pyinstaller --onefile --name literature-search literature_search.py

      - name: Package Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release
          Copy-Item dist\AcademicLiteratureSearch.exe release\
          Copy-Item dist\literature-search.exe release\
          Copy-Item README.md,LICENSE release\
          Compress-Archive -Path release\* -DestinationPath dist\academic-literature-search-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: academic-literature-search-windows
          path: dist/academic-literature-search-windows.zip

  build-macos:
    name: Build macOS app
    needs: test
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install -r requirements-build.txt

      - name: Build macOS app and CLI
        run: |
          pyinstaller --windowed --name "Academic Literature Search" literature_search_gui.py
          pyinstaller --onefile --name literature-search literature_search.py

      - name: Package macOS artifact
        run: |
          mkdir -p release
          cp -R "dist/Academic Literature Search.app" release/
          cp dist/literature-search release/
          cp README.md LICENSE release/
          ditto -c -k --sequesterRsrc --keepParent release dist/academic-literature-search-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: academic-literature-search-macos
          path: dist/academic-literature-search-macos.zip

  build-linux:
    name: Build Linux DEB
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Debian package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ "$version" = "$GITHUB_REF_NAME" ]; then
            version="0.1.0-dev"
          fi
          python packaging/deb/build_deb.py --version "$version"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: academic-literature-search-linux-deb
          path: dist/*.deb

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-macos
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" release-artifacts/* --generate-notes
